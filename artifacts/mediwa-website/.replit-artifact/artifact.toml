kind = "web"
previewPath = "/"
title = "Mediwa General Holdings"
version = "1.0.0"
id = "artifacts/mediwa-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25454

[services.development]
run = "pnpm --filter @workspace/mediwa-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mediwa-website", "run", "build" ]
serve = "static"
publicDir = "artifacts/mediwa-website/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25454"
BASE_PATH = "/"
